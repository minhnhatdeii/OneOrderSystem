appId: com.example.oneorder
---
# ========================================================
# KỊCH BẢN KIỂM THỬ END-TO-END (MAESTRO) CHO ONEORDERSYSTEM
# ========================================================

# 1. Setup Backend Data (Bỏ comment nếu bạn đã config Node)
# - runScript: setup_db.mjs

# ========================================================
# GIAI ĐOẠN 2: LOGIN VÀO APP QUẢN LÝ (STAFF)
# ========================================================
- launchApp:
    appId: com.example.oneorder_sm
    clearState: true
    clearKeychain: true
- tapOn: "Đăng nhập với tư cách Nhân viên"
- tapOn: "Email"
- inputText: "staff_test@example.com"
- tapOn: "Mật khẩu"
- inputText: "123456"
- tapOn: "Đăng nhập"
- assertVisible: "Danh sách đơn hàng" # Chờ đến khi vào được Dashboard
# Đẩy app xuống background để chuyển qua app khách
- pressHome

# ========================================================
# GIAI ĐOẠN 3: APP KHÁCH ĐẶT MÓN QUA QR DEEPLINK
# ========================================================
- launchApp:
    appId: com.example.oneorder
    clearState: true
    clearKeychain: true
# Mở deep link đóng giả quét QR
- openLink: "oneorder://tenant/test_tenant_e2e/table/999"
- assertVisible: "Thực đơn"
- tapOn: "Cơm Chiên Test"
- tapOn: "Thêm vào giỏ"
- tapOn: "Giỏ hàng"
- tapOn: "Xác nhận đặt món"
- assertVisible: "Đang chờ xử lý" # Kiểm tra trạng thái đơn là Pending

# ========================================================
# GIAI ĐOẠN 4: APP QUẢN LÝ NHẬN ĐƠN VÀ DUYỆT (REALTIME)
# ========================================================
- launchApp:
    appId: com.example.oneorder_sm
# Đơn hàng mới (Bàn 999) tự động nhảy lên nhờ WebSocket
- assertVisible: "Bàn 999" 
- tapOn: "Bàn 999"
- tapOn: "Xác nhận" # Đổi từ Pending -> Preparing
- tapOn: "Đã phục vụ" # Đổi từ Preparing -> Served
- tapOn: "Đã thanh toán" # Đổi từ Served -> Paid

# ========================================================
# GIAI ĐOẠN 5: APP KHÁCH NHẬN THÔNG BÁO THÀNH CÔNG
# ========================================================
- launchApp:
    appId: com.example.oneorder
# Trạng thái bên khách phải tự động chuyển sang Đã thanh toán
- assertVisible: "Đã thanh toán"
- assertVisible: "Cảm ơn bạn đã dùng bữa!"

# 6. Teardown Data (Bỏ comment nếu bạn đã config Node)
# - runScript: teardown_db.mjs
